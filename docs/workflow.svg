<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1180" height="660" fill="#ffffff"/>
  <text x="590" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2a44">Wastewater MAG Pathogenicity Prediction — Workflow</text>
  <text x="590" y="72" text-anchor="middle" font-size="14" fill="#6b7a99">Public data acquisition → single-MAG filtering → distributed HPC inference → stratified results</text>

  <!-- arrows between stages -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#6b7a99"/>
    </marker>
  </defs>
  <line x1="290" y1="250" x2="322" y2="250" stroke="#6b7a99" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="580" y1="250" x2="612" y2="250" stroke="#6b7a99" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="870" y1="250" x2="902" y2="250" stroke="#6b7a99" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- Stage 1 -->
  <rect x="30" y="110" width="260" height="280" rx="12" fill="#f4f6fb" stroke="#c9d3e6" stroke-width="1.5"/>
  <circle cx="62" cy="142" r="16" fill="#2b8a8a"/><text x="62" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
  <text x="88" y="147" font-size="16" font-weight="700" fill="#1f2a44">Data Acquisition</text>
  <text x="50" y="185" font-size="12.5" fill="#24324a">8 public sources, one notebook:</text>
  <text x="50" y="208" font-size="12.5" fill="#24324a">Figshare · ENA (PRJEB68319)</text>
  <text x="50" y="228" font-size="12.5" fill="#24324a">NCBI (taxon 527639) · Zenodo</text>
  <text x="50" y="248" font-size="12.5" fill="#24324a">mSystems · Nature · PubMed</text>
  <text x="50" y="284" font-size="12.5" font-style="italic" fill="#6b7a99">wastewater_MAGs_download.ipynb</text>
  <text x="50" y="304" font-size="12.5" font-style="italic" fill="#6b7a99">restore_ncbi_mags.py</text>
  <rect x="50" y="330" width="220" height="42" rx="7" fill="#e7eef7" stroke="#c9d3e6"/>
  <text x="160" y="356" text-anchor="middle" font-size="12.5" fill="#1f2a44">→ datasets/ (MAGs + metadata)</text>

  <!-- Stage 2 -->
  <rect x="320" y="110" width="260" height="280" rx="12" fill="#f4f6fb" stroke="#c9d3e6" stroke-width="1.5"/>
  <circle cx="352" cy="142" r="16" fill="#2b8a8a"/><text x="352" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
  <text x="378" y="147" font-size="16" font-weight="700" fill="#1f2a44">Extract &amp; Filter</text>
  <text x="340" y="185" font-size="12.5" fill="#24324a">Unzip NCBI archives → FASTA</text>
  <text x="340" y="208" font-size="12.5" fill="#24324a">Classify by genome size:</text>
  <text x="356" y="230" font-size="12.5" fill="#24324a">• single-MAG (0.5–12 Mb) ✓</text>
  <text x="356" y="250" font-size="12.5" fill="#24324a">• metagenome assemblies →set aside</text>
  <text x="356" y="270" font-size="12.5" fill="#24324a">• tiny fragments → set aside</text>
  <text x="340" y="304" font-size="12.5" font-style="italic" fill="#6b7a99">filter_mags.py</text>
  <rect x="340" y="330" width="220" height="42" rx="7" fill="#e7eef7" stroke="#c9d3e6"/>
  <text x="450" y="356" text-anchor="middle" font-size="12.5" fill="#1f2a44">→ mags_input/ (single organisms)</text>

  <!-- Stage 3 -->
  <rect x="610" y="110" width="260" height="280" rx="12" fill="#f4f6fb" stroke="#c9d3e6" stroke-width="1.5"/>
  <circle cx="642" cy="142" r="16" fill="#2b8a8a"/><text x="642" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
  <text x="668" y="147" font-size="15.5" font-weight="700" fill="#1f2a44">Pathogenicity Prediction</text>
  <text x="630" y="182" font-size="12.5" fill="#24324a">Slurm job array (parallel):</text>
  <!-- fan-out mini batches -->
  <rect x="630" y="196" width="52" height="22" rx="4" fill="#dbeeee" stroke="#2b8a8a"/><text x="656" y="211" text-anchor="middle" font-size="10" fill="#1f6f6f">batch 1</text>
  <rect x="690" y="196" width="52" height="22" rx="4" fill="#dbeeee" stroke="#2b8a8a"/><text x="716" y="211" text-anchor="middle" font-size="10" fill="#1f6f6f">batch 2</text>
  <rect x="750" y="196" width="52" height="22" rx="4" fill="#dbeeee" stroke="#2b8a8a"/><text x="776" y="211" text-anchor="middle" font-size="10" fill="#1f6f6f">batch 3</text>
  <text x="812" y="211" font-size="12" fill="#6b7a99">…</text>
  <text x="630" y="242" font-size="12.5" fill="#24324a">size-balanced · resumable (.done)</text>
  <text x="630" y="262" font-size="12.5" fill="#24324a">real pathogen_predict.py mags</text>
  <text x="630" y="286" font-size="12.5" font-style="italic" fill="#6b7a99">submit_array.sh · batch_predict.py</text>
  <rect x="630" y="330" width="220" height="42" rx="7" fill="#e7eef7" stroke="#c9d3e6"/>
  <text x="740" y="350" text-anchor="middle" font-size="12" fill="#1f2a44">per-batch CSV/JSON → merge</text>
  <text x="740" y="366" text-anchor="middle" font-size="11" fill="#6b7a99">(gather step)</text>

  <!-- Stage 4 -->
  <rect x="900" y="110" width="250" height="280" rx="12" fill="#f4f6fb" stroke="#c9d3e6" stroke-width="1.5"/>
  <circle cx="932" cy="142" r="16" fill="#2b8a8a"/><text x="932" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">4</text>
  <text x="958" y="147" font-size="16" font-weight="700" fill="#1f2a44">Results &amp; Report</text>
  <text x="920" y="185" font-size="12.5" fill="#24324a">Merged predictions (per genome)</text>
  <text x="920" y="208" font-size="12.5" fill="#24324a">Confidence stratification:</text>
  <text x="936" y="230" font-size="12.5" fill="#24324a">ML-supported vs BLAST-only</text>
  <text x="920" y="254" font-size="12.5" fill="#24324a">Findings report + QC caveats</text>
  <text x="920" y="290" font-size="12.5" font-style="italic" fill="#6b7a99">prediction_results_ALL.csv</text>
  <text x="920" y="310" font-size="12.5" font-style="italic" fill="#6b7a99">pathogen_prediction_report.md</text>
  <rect x="920" y="330" width="210" height="42" rx="7" fill="#e7eef7" stroke="#c9d3e6"/>
  <text x="1025" y="356" text-anchor="middle" font-size="12.5" fill="#1f2a44">→ publication-ready findings</text>

  <!-- model/pangenome input feeding stage 3 -->
  <rect x="560" y="470" width="360" height="70" rx="10" fill="#fff6ec" stroke="#e0b783" stroke-width="1.5"/>
  <text x="740" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a1f">Trained model + pangenome (read-only inputs)</text>
  <text x="740" y="522" text-anchor="middle" font-size="12" fill="#8a5a1f">RF + XGBoost · ppanggolin gene_presence_absence.Rtab · BLAST DB</text>
  <line x1="740" y1="470" x2="740" y2="392" stroke="#e0b783" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#ah)"/>

  <text x="590" y="600" text-anchor="middle" font-size="12" fill="#9aa7bd">Scatter/gather batch inference on HPC (Slurm) — deterministic partitioning, per-shard checkpointing, dependency-gated merge.</text>
</svg>
